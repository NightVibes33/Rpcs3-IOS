name: Validate Metal Shader Resource Reflection

on:
  workflow_dispatch:
  push:
    branches: [metal-resource-reflection]
    paths:
      - "Renderers/Metal/RPCS3MetalShaderTranslator.*"
      - "Renderers/Metal/RPCS3MetalShaderLibrary.*"
      - "SPIRV_CROSS_REVISION"
      - "scripts/build-spirv-cross-ios.sh"
      - ".github/workflows/metal-resource-reflection.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: metal-resource-reflection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile reflected Metal shader bindings
    runs-on: macos-26
    timeout-minutes: 30
    env:
      STATUS_CONTEXT: "RPCS3 Metal resource reflection"
      DEPLOYMENT_TARGET: "26.0"
      RPCS3_IOS_SPIRV_CROSS_ROOT: "${{ github.workspace }}/BuildSupport/SPIRV-Cross"
      CI_LOGS: "${{ github.workspace }}/ci-logs"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish pending status
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"Compiling SPIR-V to MSL resource reflection\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Select iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CI_LOGS" build-metal-reflection
          sdk="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
          if [[ "$sdk" != 26.* ]]; then
            while IFS= read -r app; do
              developer="$app/Contents/Developer"
              candidate="$(DEVELOPER_DIR="$developer" xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
              if [[ "$candidate" == 26.* ]]; then
                sudo xcode-select -s "$developer"
                break
              fi
            done < <(find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort)
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Restore SPIRV-Cross cache
        uses: actions/cache@v4
        with:
          path: |
            BuildSupport/SPIRV-Cross
            .cache/SPIRV-Cross-ios
            .deps/SPIRV-Cross
          key: spirv-cross-${{ hashFiles('SPIRV_CROSS_REVISION') }}-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v1

      - name: Build SPIRV-Cross
        id: spirv-cross
        shell: bash
        run: bash scripts/build-spirv-cross-ios.sh

      - name: Compile reflection layer
        id: compile
        shell: bash
        run: |
          set -euo pipefail
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          CPP_COMMON=(
            -std=c++20 -arch arm64 -miphoneos-version-min=26.0
            -isysroot "$SDK" -Wall -Wextra -Werror
            -I "$RPCS3_IOS_SPIRV_CROSS_ROOT/include/spirv_cross"
          )
          xcrun --sdk iphoneos clang++ "${CPP_COMMON[@]}" \
            -c Renderers/Metal/RPCS3MetalShaderTranslator.cpp \
            -o build-metal-reflection/RPCS3MetalShaderTranslator.o \
            2>&1 | tee build-metal-reflection/translator.log
          xcrun --sdk iphoneos clang++ \
            -std=c++20 -fobjc-arc -arch arm64 -miphoneos-version-min=26.0 \
            -isysroot "$SDK" -fmodules -Wall -Wextra -Werror \
            -c Renderers/Metal/RPCS3MetalShaderLibrary.mm \
            -o build-metal-reflection/RPCS3MetalShaderLibrary.o \
            2>&1 | tee build-metal-reflection/library.log
          file build-metal-reflection/*.o
          for object in build-metal-reflection/*.o; do lipo -info "$object"; done

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Metal-resource-reflection
          path: build-metal-reflection/**
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final status
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.spirv-cross.outcome }}" == "success" && "${{ steps.compile.outcome }}" == "success" ]]; then
            state="success"
            description="Metal buffer, texture, and sampler reflection compiled"
          else
            state="failure"
            description="Metal shader resource reflection reached a compiler blocker"
          fi
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
