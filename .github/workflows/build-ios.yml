name: Build RPCS3 Qt iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "QtApp/**"
      - "CoreBridge/**"
      - "Port/**"
      - "cmake/**"
      - "scripts/**"
      - "UPSTREAM_RPCS3_REVISION"
      - ".github/workflows/build-ios.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: rpcs3-qt-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Real Qt Widgets arm64 IPA
    runs-on: macos-26
    timeout-minutes: 120

    env:
      DEPLOYMENT_TARGET: "26.0"
      QT_VERSION: "6.11.1"
      QT_ROOT: "${{ github.workspace }}/.qt"
      QT_APP_BUILD: "${{ github.workspace }}/qt-ios-build"
      CI_LOGS: "${{ github.workspace }}/ci-logs"
      STATUS_CONTEXT: "RPCS3 Qt iOS IPA"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish pending build status
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"RPCS3 Qt iOS build is running\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Select an installed Xcode with iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CI_LOGS"
          echo "Current developer directory: $(xcode-select -p)"
          xcodebuild -version || true
          CURRENT_SDK="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"

          if [[ "$CURRENT_SDK" != 26.* ]]; then
            XCODE_PATH=""
            while IFS= read -r candidate; do
              developer="$candidate/Contents/Developer"
              [[ -d "$developer" ]] || continue
              sdk="$(DEVELOPER_DIR="$developer" xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
              echo "Candidate: $candidate (iphoneos $sdk)"
              if [[ "$sdk" == 26.* ]]; then
                XCODE_PATH="$candidate"
              fi
            done < <(find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort)

            if [[ -z "$XCODE_PATH" ]]; then
              echo "No installed Xcode exposes an iOS 26 SDK."
              find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort
              exit 1
            fi

            echo "Selecting $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi

          xcodebuild -version | tee "$CI_LOGS/xcode-version.txt"
          cmake --version | tee "$CI_LOGS/cmake-version.txt"
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iphoneos SDK: $SDK_VERSION" | tee "$CI_LOGS/sdk-version.txt"
          [[ "$SDK_VERSION" == 26.* ]] || { echo "Expected iOS 26 SDK, got $SDK_VERSION"; exit 1; }

      - name: Cache Qt for iOS
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_ROOT }}
          key: qt-${{ runner.os }}-${{ runner.arch }}-ios-${{ env.QT_VERSION }}-base-v3

      - name: Install Qt for iOS and host tools
        if: steps.qt-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee "$CI_LOGS/qt-install.log") 2>&1
          AQT_VENV="$RUNNER_TEMP/aqt-venv"
          python3 -m venv "$AQT_VENV"
          source "$AQT_VENV/bin/activate"
          python -m pip install --upgrade pip aqtinstall
          IOS_ARCH="$(python -m aqt list-qt mac ios --arch "$QT_VERSION" | tr ' ' '\n' | sed '/^$/d' | head -n 1)"
          test -n "$IOS_ARCH"
          echo "Installing base Qt $QT_VERSION for iOS architecture $IOS_ARCH with matching host tools"
          python -m aqt install-qt mac ios "$QT_VERSION" "$IOS_ARCH" \
            --autodesktop \
            -O "$QT_ROOT"

      - name: Verify Qt toolchains
        shell: bash
        run: |
          set -euo pipefail
          test -x "$QT_ROOT/$QT_VERSION/ios/bin/qt-cmake"
          test -x "$QT_ROOT/$QT_VERSION/macos/bin/qt-cmake"
          UIC="$QT_ROOT/$QT_VERSION/macos/libexec/uic"
          if [[ ! -x "$UIC" ]]; then UIC="$QT_ROOT/$QT_VERSION/macos/bin/uic"; fi
          test -x "$UIC"
          "$QT_ROOT/$QT_VERSION/ios/bin/qt-cmake" --version | tee "$CI_LOGS/qt-cmake-version.txt"
          "$UIC" -v 2>&1 | tee "$CI_LOGS/qt-uic-version.txt"
          find "$QT_ROOT/$QT_VERSION/ios" -maxdepth 3 -name 'Qt6Widgets*' -print | tee "$CI_LOGS/qt-widgets-files.txt"

      - name: Build upstream-derived RPCS3 core archive
        shell: bash
        run: |
          set -o pipefail
          bash scripts/build-upstream-ios-core.sh 2>&1 | tee "$CI_LOGS/core-build-console.log"

      - name: Build actual RPCS3 Qt iOS application
        shell: bash
        run: |
          set -o pipefail
          bash scripts/build-qt-ios-app.sh 2>&1 | tee "$CI_LOGS/qt-app-build-console.log"

      - name: Validate real Qt main window and device bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          APP="$(cat "$QT_APP_BUILD/app-path.txt")"
          BIN="$APP/RPCS3-iOS"
          CORE_ARCHIVE="$GITHUB_WORKSPACE/BuildSupport/librpcs3-ios-core.a"
          UI_SOURCE="$GITHUB_WORKSPACE/QtApp/Generated/ui/main_window.ui"
          UI_HEADER="$(find "$QT_APP_BUILD" -type f -name ui_main_window.h -print | head -n 1)"
          UI_FACTORY="$GITHUB_WORKSPACE/QtApp/Generated/RPCS3QtUiFactory.cpp"

          test -d "$APP"
          test -f "$BIN"
          test -f "$CORE_ARCHIVE"
          test -f "$UI_SOURCE"
          test -f "$UI_HEADER"
          test -f "$UI_FACTORY"

          grep -q '<class>main_window</class>' "$UI_SOURCE"
          grep -q 'name="menuFile"' "$UI_SOURCE"
          grep -q 'name="bootVSHAct"' "$UI_SOURCE"
          grep -q 'class Ui_main_window' "$UI_HEADER"
          grep -q 'bootGameAct' "$UI_HEADER"
          grep -q 'menuConfiguration' "$UI_HEADER"
          grep -q 'main_window.ui' "$UI_FACTORY"

          file "$CORE_ARCHIVE"
          lipo -info "$CORE_ARCHIVE"
          xcrun ar -t "$CORE_ARCHIVE"
          nm -gU "$CORE_ARCHIVE" | grep -q '_rpcs3_ios_core_initialize'
          nm -gU "$CORE_ARCHIVE" | grep -q '_rpcs3_ios_core_boot_elf'

          file "$BIN"
          lipo -info "$BIN"
          xcrun vtool -show-build "$BIN" || true
          file "$BIN" | grep -q 'arm64'
          strings "$BIN" | grep -q 'RPCS3 Qt iOS upstream main_window.ui'
          nm -gU "$BIN" | grep -q '_rpcs3_ios_core_initialize'
          nm -gU "$BIN" | grep -q '_rpcs3_ios_core_boot_elf'
          [[ "$APP" == *Release* ]] || { echo "Refusing non-Release product path: $APP"; exit 1; }
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Package unsigned Qt IPA
        shell: bash
        run: |
          set -euo pipefail
          rm -rf Payload output
          mkdir -p Payload output
          cp -R "${{ steps.bundle.outputs.app }}" Payload/RPCS3-iOS.app
          rm -rf Payload/RPCS3-iOS.app/_CodeSignature
          rm -f Payload/RPCS3-iOS.app/embedded.mobileprovision
          SHORT_SHA="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          IPA="output/RPCS3-Qt-iOS26-${SHORT_SHA}-unsigned.ipa"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload "$IPA"
          shasum -a 256 "$IPA" > "$IPA.sha256"
          unzip -l "$IPA"
          ls -lh output

      - name: Upload unsigned Qt IPA
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Qt-iOS26-unsigned
          path: output/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Qt-iOS-ci-logs
          path: ci-logs/**
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Qt and upstream build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Qt-iOS-build-evidence
          path: |
            qt-ios-build/**
            cmake-ios-build/**
            cmake-ios-build.tar.gz
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final build status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          case "${{ job.status }}" in
            success) state="success"; description="RPCS3 Qt iOS unsigned IPA built successfully" ;;
            cancelled) state="error"; description="RPCS3 Qt iOS build was cancelled" ;;
            *) state="failure"; description="RPCS3 Qt iOS build failed" ;;
          esac
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
