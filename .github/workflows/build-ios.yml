name: Build iOS 26 Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "App/**"
      - "CoreBridge/**"
      - "Port/**"
      - "cmake/**"
      - "project.yml"
      - "scripts/**"
      - ".github/workflows/build-ios.yml"

permissions:
  contents: read

concurrency:
  group: ios26-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Real-device arm64 IPA
    runs-on: macos-26
    timeout-minutes: 120

    env:
      DEPLOYMENT_TARGET: "26.0"
      DERIVED_DATA: "${{ github.workspace }}/DerivedData"
      CI_LOGS: "${{ github.workspace }}/ci-logs"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select an installed Xcode with iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CI_LOGS"
          echo "Current developer directory: $(xcode-select -p)"
          xcodebuild -version || true
          CURRENT_SDK="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"

          if [[ "$CURRENT_SDK" != 26.* ]]; then
            XCODE_PATH=""
            while IFS= read -r candidate; do
              developer="$candidate/Contents/Developer"
              [[ -d "$developer" ]] || continue
              sdk="$(DEVELOPER_DIR="$developer" xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
              echo "Candidate: $candidate (iphoneos $sdk)"
              if [[ "$sdk" == 26.* ]]; then
                XCODE_PATH="$candidate"
              fi
            done < <(find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort)

            if [[ -z "$XCODE_PATH" ]]; then
              echo "No installed Xcode exposes an iOS 26 SDK."
              find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort
              exit 1
            fi

            echo "Selecting $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi

          xcodebuild -version | tee "$CI_LOGS/xcode-version.txt"
          cmake --version | tee "$CI_LOGS/cmake-version.txt"
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iphoneos SDK: $SDK_VERSION" | tee "$CI_LOGS/sdk-version.txt"
          [[ "$SDK_VERSION" == 26.* ]] || { echo "Expected iOS 26 SDK, got $SDK_VERSION"; exit 1; }

      - name: Install XcodeGen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version | tee "$CI_LOGS/xcodegen-version.txt"

      - name: Build upstream-derived RPCS3 core archive
        shell: bash
        run: |
          set -o pipefail
          bash scripts/build-upstream-ios-core.sh 2>&1 | tee "$CI_LOGS/core-build-console.log"

      - name: Generate Xcode project
        shell: bash
        run: |
          set -o pipefail
          xcodegen generate --spec project.yml 2>&1 | tee "$CI_LOGS/xcodegen.log"

      - name: Build unsigned physical-device app
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project RPCS3-iOS.xcodeproj \
            -scheme RPCS3-iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            IPHONEOS_DEPLOYMENT_TARGET="$DEPLOYMENT_TARGET" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            clean build 2>&1 | tee "$CI_LOGS/xcodebuild.log"

      - name: Validate upstream core and device bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT_DIR="$DERIVED_DATA/Build/Products/Release-iphoneos"
          APP="$PRODUCT_DIR/RPCS3-iOS.app"
          BIN="$APP/RPCS3-iOS"
          CORE_ARCHIVE="$GITHUB_WORKSPACE/BuildSupport/librpcs3-ios-core.a"
          test -d "$APP"
          test -f "$BIN"
          test -f "$CORE_ARCHIVE"
          file "$CORE_ARCHIVE"
          lipo -info "$CORE_ARCHIVE"
          xcrun ar -t "$CORE_ARCHIVE"
          nm -gU "$CORE_ARCHIVE" | grep -q '_rpcs3_ios_core_initialize'
          nm -gU "$CORE_ARCHIVE" | grep -q '_rpcs3_ios_core_boot_elf'
          nm -gU "$CORE_ARCHIVE" | grep -q '_mbedtls_sha256_ret'
          nm -gU "$CORE_ARCHIVE" | grep -q 'probe_ps3_elf'
          nm -gU "$CORE_ARCHIVE" | grep -q 'probe_ps3_self'
          nm -gU "$CORE_ARCHIVE" | grep -q 'build_plain_self_load_plan'
          nm -gU "$CORE_ARCHIVE" | grep -q 'extract_plain_self_to_elf'
          file "$BIN"
          lipo -info "$BIN"
          xcrun vtool -show-build "$BIN" || true
          file "$BIN" | grep -q 'arm64'
          nm -gU "$BIN" | grep -q '_rpcs3_ios_core_initialize'
          [[ "$APP" == *Release-iphoneos* ]] || { echo "Refusing non-device product path."; exit 1; }
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          rm -rf Payload output
          mkdir -p Payload output
          cp -R "${{ steps.bundle.outputs.app }}" Payload/RPCS3-iOS.app
          rm -rf Payload/RPCS3-iOS.app/_CodeSignature
          rm -f Payload/RPCS3-iOS.app/embedded.mobileprovision
          SHORT_SHA="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          IPA="output/RPCS3-iOS-iOS26-${SHORT_SHA}-unsigned.ipa"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload "$IPA"
          shasum -a 256 "$IPA" > "$IPA.sha256"
          unzip -l "$IPA"
          ls -lh output

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-iOS-iOS26-unsigned
          path: output/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-iOS-ci-logs
          path: ci-logs/**
          if-no-files-found: warn
          retention-days: 30

      - name: Upload upstream core build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-iOS-upstream-core-evidence
          path: |
            cmake-ios-build/**
            cmake-ios-build.tar.gz
          if-no-files-found: warn
          retention-days: 30