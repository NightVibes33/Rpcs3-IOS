name: Validate Metal Live Shader Frontend Patch

on:
  workflow_dispatch:
  push:
    branches: [metal-live-shader-frontend-ea709bb]
    paths:
      - "Renderers/Metal/RPCS3MetalRSXShaderFrontend.*"
      - "Renderers/Metal/RPCS3MetalGSRender.*"
      - "scripts/patch-upstream-ios-metal-shader-frontend.py"
      - "scripts/patch-upstream-ios-emu-graph.py"
      - "scripts/patch-upstream-ios-vulkan.py"
      - ".github/workflows/validate-metal-live-shader-patch.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: metal-live-shader-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Patch pinned RPCS3 shader frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      STATUS_CONTEXT: "RPCS3 Metal live shader patch"
    steps:
      - name: Checkout iOS port
        uses: actions/checkout@v4

      - name: Publish pending status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"Applying the live RSX shader frontend patch\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Clone pinned RPCS3
        run: |
          set -euo pipefail
          revision="$(tr -d '[:space:]' < UPSTREAM_RPCS3_REVISION)"
          test -n "$revision"
          git clone --filter=blob:none --depth 1 --branch "$revision" --single-branch \
            https://github.com/RPCS3/rpcs3.git upstream-rpcs3

      - name: Apply and verify shader frontend patch
        id: patch
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/patch-upstream-ios-metal-shader-frontend.py
          python3 scripts/patch-upstream-ios-metal-shader-frontend.py upstream-rpcs3

          grep -q 'bool compile_spirv();' upstream-rpcs3/rpcs3/Emu/RSX/VK/VKProgramPipeline.h
          grep -q 'bool shader::compile_spirv()' upstream-rpcs3/rpcs3/Emu/RSX/VK/VKProgramPipeline.cpp
          grep -q 'DecompileForMetal' upstream-rpcs3/rpcs3/Emu/RSX/VK/VKVertexProgram.h
          grep -q 'TaskForMetal' upstream-rpcs3/rpcs3/Emu/RSX/VK/VKVertexProgram.cpp
          grep -q 'DecompileForMetal' upstream-rpcs3/rpcs3/Emu/RSX/VK/VKFragmentProgram.h
          grep -q 'TaskForMetal' upstream-rpcs3/rpcs3/Emu/RSX/VK/VKFragmentProgram.cpp
          git -C upstream-rpcs3 diff --check
          git -C upstream-rpcs3 diff -- \
            rpcs3/Emu/RSX/VK/VKProgramPipeline.h \
            rpcs3/Emu/RSX/VK/VKProgramPipeline.cpp \
            rpcs3/Emu/RSX/VK/VKVertexProgram.h \
            rpcs3/Emu/RSX/VK/VKVertexProgram.cpp \
            rpcs3/Emu/RSX/VK/VKFragmentProgram.h \
            rpcs3/Emu/RSX/VK/VKFragmentProgram.cpp \
            > metal-live-shader-upstream.patch
          test -s metal-live-shader-upstream.patch

      - name: Upload patched upstream diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Metal-live-shader-upstream-patch
          path: metal-live-shader-upstream.patch
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.patch.outcome }}" == "success" ]]; then
            state="success"
            description="Pinned RPCS3 accepts the Metal live shader frontend patch"
          else
            state="failure"
            description="Pinned RPCS3 shader frontend patch no longer applies cleanly"
          fi
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
