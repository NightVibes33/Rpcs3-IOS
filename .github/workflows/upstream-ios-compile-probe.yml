name: Upstream RPCS3 iOS Compile Probe

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cmake/toolchains/**"
      - "scripts/compile-upstream-probe.sh"
      - ".github/workflows/upstream-ios-compile-probe.yml"

permissions:
  contents: read

concurrency:
  group: upstream-ios-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-probe:
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - name: Checkout port repository
        uses: actions/checkout@v4

      - name: Select installed Xcode 26
        shell: bash
        run: |
          set -euo pipefail
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' -print | sort -V | tail -n 1)"
          test -n "$XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "Using iPhoneOS SDK $SDK_VERSION"
          [[ "$SDK_VERSION" == 26.* ]]

      - name: Run physical-device compile probe
        shell: bash
        run: bash scripts/compile-upstream-probe.sh

      - name: Upload compile evidence
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-upstream-ios-compile-probe
          path: |
            compile-probe/**
            compile-probe.tar.gz
          if-no-files-found: error
          retention-days: 30
