name: Validate Metal Resource Binder Integration

on:
  workflow_dispatch:
  push:
    branches: [metal-resource-binding-integration]
    paths: &integration_paths
      - "Renderers/Metal/RPCS3MetalDrawSubmission.*"
      - "Renderers/Metal/RPCS3MetalResourceBinder.*"
      - "Renderers/Metal/RPCS3MetalRenderer.*"
      - ".github/workflows/metal-resource-binding-integration.yml"
  pull_request:
    branches: [metal-resource-binding-integration]
    paths: *integration_paths

permissions:
  contents: read
  statuses: write

concurrency:
  group: metal-resource-binding-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile renderer-owned reflected bindings
    runs-on: macos-26
    timeout-minutes: 20
    env:
      STATUS_CONTEXT: "RPCS3 Metal binder integration"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish pending status
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"Compiling renderer delegation to reflected Metal resource bindings\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Select iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail
          sdk="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
          if [[ "$sdk" != 26.* ]]; then
            while IFS= read -r app; do
              developer="$app/Contents/Developer"
              candidate="$(DEVELOPER_DIR="$developer" xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
              if [[ "$candidate" == 26.* ]]; then
                sudo xcode-select -s "$developer"
                break
              fi
            done < <(find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort)
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Compile renderer, binder, and submission objects
        id: compile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-metal-binder-integration
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          CPP=(
            -std=c++20 -arch arm64 -miphoneos-version-min=26.0
            -isysroot "$SDK" -Wall -Wextra -Werror
          )
          OBJCXX=(
            -std=c++20 -fobjc-arc -arch arm64 -miphoneos-version-min=26.0
            -isysroot "$SDK" -fmodules -Wall -Wextra -Werror
          )
          xcrun --sdk iphoneos clang++ "${CPP[@]}" \
            -c Renderers/Metal/RPCS3MetalDrawSubmission.cpp \
            -o build-metal-binder-integration/RPCS3MetalDrawSubmission.o
          xcrun --sdk iphoneos clang++ "${OBJCXX[@]}" \
            -c Renderers/Metal/RPCS3MetalResourceBinder.mm \
            -o build-metal-binder-integration/RPCS3MetalResourceBinder.o
          xcrun --sdk iphoneos clang++ "${OBJCXX[@]}" \
            -c Renderers/Metal/RPCS3MetalRenderer.mm \
            -o build-metal-binder-integration/RPCS3MetalRenderer.o \
            2>&1 | tee build-metal-binder-integration/RPCS3MetalRenderer-compile.log
          file build-metal-binder-integration/*.o
          for object in build-metal-binder-integration/*.o; do lipo -info "$object"; done
          nm -gU build-metal-binder-integration/RPCS3MetalResourceBinder.o | c++filt \
            | tee build-metal-binder-integration/binder-symbols.txt
          nm -u build-metal-binder-integration/RPCS3MetalRenderer.o | c++filt \
            | tee build-metal-binder-integration/renderer-undefined-symbols.txt
          grep -q 'bind_draw_resources' build-metal-binder-integration/binder-symbols.txt
          grep -q 'bind_draw_resources' build-metal-binder-integration/renderer-undefined-symbols.txt

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Metal-binder-integration
          path: build-metal-binder-integration/**
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final status
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.compile.outcome }}" == "success" ]]; then
            state="success"
            description="Renderer delegation to reflected Metal resources compiled for arm64 iOS"
          else
            state="failure"
            description="Renderer resource-binder integration reached a compiler blocker"
          fi
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
