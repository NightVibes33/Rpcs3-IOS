name: Validate Metal Resource Bindings

on:
  workflow_dispatch:
  push:
    branches: [metal-resource-binding]
    paths:
      - "Renderers/Metal/RPCS3MetalDrawSubmission.*"
      - ".github/workflows/metal-resource-binding.yml"

permissions:
  contents: read
  statuses: write

jobs:
  compile:
    name: Compile typed reflected bindings
    runs-on: macos-26
    timeout-minutes: 20
    env:
      STATUS_CONTEXT: "RPCS3 Metal typed bindings"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish pending status
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"Compiling reflected buffer, texture-buffer, texture, and sampler bindings\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Compile and test binding validation
        id: compile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-metal-bindings
          clang++ -std=c++20 -Wall -Wextra -Werror -I. \
            -c Renderers/Metal/RPCS3MetalDrawSubmission.cpp \
            -o build-metal-bindings/RPCS3MetalDrawSubmission.o
          cat > build-metal-bindings/tests.cpp <<'CPP'
          #include "Renderers/Metal/RPCS3MetalDrawSubmission.h"
          #include <array>
          #include <cassert>
          #include <cstddef>
          #include <cstdint>
          #include <string>

          using namespace rpcs3::ios::render::metal_rsx;

          int main()
          {
              int pipeline = 1;
              std::array<std::uint32_t, 16> draw_parameters{};
              std::array<std::uint32_t, 32> persistent_stream{};
              std::string error;

              draw_submission draw;
              draw.render_pipeline_state = &pipeline;
              draw.vertex_count = 3;
              draw.buffers.push_back({resource_stage::vertex, 2,
                  {draw_parameters.data(), sizeof(draw_parameters)}});
              draw.texture_buffers.push_back({resource_stage::vertex, 3, 1,
                  sizeof(std::uint32_t), {persistent_stream.data(), sizeof(persistent_stream)}});
              assert(validate_draw_submission(draw, error));

              draw.texture_buffers[0].bytes_per_texel = 3;
              assert(!validate_draw_submission(draw, error));
              draw.texture_buffers[0].bytes_per_texel = sizeof(std::uint32_t);

              draw.buffers[0].index = UINT32_MAX;
              assert(!validate_draw_submission(draw, error));
              draw.buffers[0].index = 2;

              draw.indices = index_format::uint16;
              draw.index_count = 3;
              std::array<std::uint16_t, 3> indices{0, 1, 2};
              draw.index_buffer = {indices.data(), sizeof(indices)};
              assert(validate_draw_submission(draw, error));
              return 0;
          }
          CPP
          clang++ -std=c++20 -Wall -Wextra -Werror -I. \
            Renderers/Metal/RPCS3MetalDrawSubmission.cpp \
            build-metal-bindings/tests.cpp \
            -o build-metal-bindings/tests
          build-metal-bindings/tests
          file build-metal-bindings/RPCS3MetalDrawSubmission.o

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Metal-typed-bindings
          path: build-metal-bindings/**
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final status
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.compile.outcome }}" == "success" ]]; then
            state="success"
            description="Typed reflected Metal binding validation passed"
          else
            state="failure"
            description="Typed Metal binding validation reached a compiler or test blocker"
          fi
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
