name: Probe Real RPCS3 iOS Graph

on:
  workflow_dispatch:
  push:
    branches: [metal-live-programs]
    paths:
      - "Port/**"
      - "CoreBridge/**"
      - "Renderers/**"
      - "cmake/**"
      - "scripts/**"
      - "UPSTREAM_RPCS3_REVISION"
      - "MOLTENVK_REVISION"
      - "SPIRV_CROSS_REVISION"
      - ".github/workflows/upstream-graph-probe.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: rpcs3-ios-upstream-graph-${{ github.ref }}
  cancel-in-progress: false

jobs:
  probe:
    name: Real upstream CMake graph
    runs-on: macos-26
    timeout-minutes: 240
    env:
      STATUS_CONTEXT: "RPCS3 Vulkan Metal graph"
      DEPLOYMENT_TARGET: "26.0"
      RPCS3_IOS_FFMPEG_ROOT: "${{ github.workspace }}/BuildSupport/ffmpeg-ios"
      FFMPEG_IOS_ROOT: "${{ github.workspace }}/BuildSupport/ffmpeg-ios"
      RPCS3_IOS_MOLTENVK_ROOT: "${{ github.workspace }}/BuildSupport/MoltenVK"
      MOLTENVK_ROOT: "${{ github.workspace }}/BuildSupport/MoltenVK"
      RPCS3_IOS_SPIRV_CROSS_ROOT: "${{ github.workspace }}/BuildSupport/SPIRV-Cross"
    steps:
      - name: Checkout iOS port
        uses: actions/checkout@v4

      - name: Publish pending graph status
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"Compiling live RSX programs with MoltenVK and native Metal\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Select iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail
          sdk="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
          if [[ "$sdk" != 26.* ]]; then
            while IFS= read -r app; do
              developer="$app/Contents/Developer"
              candidate="$(DEVELOPER_DIR="$developer" xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
              if [[ "$candidate" == 26.* ]]; then
                sudo xcode-select -s "$developer"
                break
              fi
            done < <(find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort)
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Restore FFmpeg iOS cache
        id: ffmpeg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            BuildSupport/ffmpeg-ios
            .cache/ffmpeg-n7.1
          key: ffmpeg-n7.1-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v1

      - name: Restore MoltenVK iOS cache
        id: moltenvk-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            BuildSupport/MoltenVK
            .cache/MoltenVK
          key: moltenvk-${{ hashFiles('MOLTENVK_REVISION') }}-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v2

      - name: Restore SPIRV-Cross iOS cache
        id: spirv-cross-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            BuildSupport/SPIRV-Cross
            .cache/SPIRV-Cross-ios
            .deps/SPIRV-Cross
          key: spirv-cross-${{ hashFiles('SPIRV_CROSS_REVISION') }}-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v1

      - name: Build real upstream RPCS3 Vulkan and Metal graph
        id: graph
        shell: bash
        run: |
          set +e
          bash scripts/probe-upstream-ios-graph.sh
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Save FFmpeg iOS cache
        if: always() && steps.ffmpeg-cache.outputs.cache-hit != 'true' && hashFiles('BuildSupport/ffmpeg-ios/.rpcs3-ios-ffmpeg-n7.1') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            BuildSupport/ffmpeg-ios
            .cache/ffmpeg-n7.1
          key: ffmpeg-n7.1-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v1

      - name: Save MoltenVK iOS cache
        if: always() && steps.moltenvk-cache.outputs.cache-hit != 'true' && hashFiles('BuildSupport/MoltenVK/device-binary-path.txt') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            BuildSupport/MoltenVK
            .cache/MoltenVK
          key: moltenvk-${{ hashFiles('MOLTENVK_REVISION') }}-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v2

      - name: Save SPIRV-Cross iOS cache
        if: always() && steps.spirv-cross-cache.outputs.cache-hit != 'true' && hashFiles('BuildSupport/SPIRV-Cross/lib/libspirv-cross-msl.a') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            BuildSupport/SPIRV-Cross
            .cache/SPIRV-Cross-ios
            .deps/SPIRV-Cross
          key: spirv-cross-${{ hashFiles('SPIRV_CROSS_REVISION') }}-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v1

      - name: Upload graph evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-Vulkan-Metal-upstream-ios-graph
          path: cmake-ios-upstream-graph/**
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final graph status
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          probe_status="${{ steps.graph.outputs.status }}"
          if [[ "$probe_status" == "0" ]]; then
            state="success"
            description="Live RSX program compiler linked with Vulkan and Metal"
          else
            state="failure"
            description="Live RSX program compiler reached a documented graph blocker"
          fi
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
