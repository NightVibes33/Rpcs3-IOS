name: Probe Real RPCS3 iOS Graph

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Port/**"
      - "CoreBridge/**"
      - "cmake/**"
      - "scripts/**"
      - "UPSTREAM_RPCS3_REVISION"
      - ".github/workflows/upstream-graph-probe.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: rpcs3-ios-upstream-graph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    name: Real upstream CMake graph
    runs-on: macos-26
    timeout-minutes: 240
    env:
      STATUS_CONTEXT: "RPCS3 real upstream graph"
      DEPLOYMENT_TARGET: "26.0"
      RPCS3_IOS_FFMPEG_ROOT: "${{ github.workspace }}/BuildSupport/ffmpeg-ios"
      FFMPEG_IOS_ROOT: "${{ github.workspace }}/BuildSupport/ffmpeg-ios"
    steps:
      - name: Checkout iOS port
        uses: actions/checkout@v4

      - name: Patch pinned RPCS3 v0.0.40 bridge compatibility
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/patch-upstream-ios-v0040-compat.py "$GITHUB_WORKSPACE"
          grep -q 'v0.0.40 selects Null as the default renderer directly' CoreBridge/RPCS3UpstreamRuntimeBridge.cpp
          grep -q 'Database-config callbacks were added after the pinned v0.0.40 ABI' CoreBridge/RPCS3UpstreamRuntimeBridge.cpp
          grep -q 'v0.0.40 has no SetHeadless API' CoreBridge/RPCS3UpstreamRuntimeBridge.cpp
          if grep -q '^    try$' CoreBridge/RPCS3UpstreamFirmwareInstaller.cpp; then
            echo "Firmware installer still contains exception guards" >&2
            exit 1
          fi
          echo "PASS: pinned bridge sources match RPCS3 v0.0.40 no-exceptions ABI"

      - name: Complete physical-iOS graph template
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          graph_patch = Path("scripts/patch-upstream-ios-emu-graph.py")
          text = graph_patch.read_text(encoding="utf-8")
          audio_unit = '        "-framework AudioUnit"\n'
          if text.count(audio_unit) != 1:
              raise SystemExit("Unexpected direct AudioUnit framework count in graph template")
          text = text.replace(audio_unit, "", 1)
          graph_patch.write_text(text, encoding="utf-8")
          if '"-framework AudioUnit"' in text:
              raise SystemExit("Direct AudioUnit framework remains in graph template")

          probe = Path("scripts/probe-upstream-ios-graph.sh")
          probe_text = probe.read_text(encoding="utf-8")
          anchor = 'run_timed 180 python3 scripts/patch-upstream-ios-emu-graph.py "$ROOT"\n'
          late_link = 'run_timed 120 python3 scripts/patch-upstream-ios-audio-frameworks.py "$ROOT"\n'
          if late_link not in probe_text:
              if probe_text.count(anchor) != 1:
                  raise SystemExit("Unable to locate graph-generation call for late runtime linkage")
              probe_text = probe_text.replace(anchor, anchor + late_link, 1)
          if probe_text.count(late_link) != 1:
              raise SystemExit("Graph probe did not receive exactly one late runtime-linkage call")

          old_validation = '''      nm -gU "$probe_binary" > "$BUILD/runtime-link-probe-symbols.txt"
              if grep -q '_rpcs3_ios_upstream_runtime_link_probe' "$BUILD/runtime-link-probe-symbols.txt"; then
                probe_symbol_present=true
              else
                phase "Runtime link probe is missing the exported bridge symbol"
                link_probe_status=127
              fi
          '''
          new_validation = '''      runtime_framework_binary="$(find "$BUILD/tree" -type f -path '*/RPCS3UpstreamRuntime.framework/RPCS3UpstreamRuntime' -print | head -n 1)"
              if [[ -z "$runtime_framework_binary" || ! -f "$runtime_framework_binary" ]]; then
                phase "Runtime link probe is missing its RPCS3UpstreamRuntime framework provider"
                link_probe_status=127
              else
                nm -gU "$runtime_framework_binary" > "$BUILD/runtime-framework-symbols.txt"
                otool -L "$probe_binary" > "$BUILD/runtime-link-probe-linked-libraries.txt"
                if grep -q '_rpcs3_ios_upstream_runtime_link_probe' "$BUILD/runtime-framework-symbols.txt" && \\
                   grep -q 'RPCS3UpstreamRuntime.framework/RPCS3UpstreamRuntime' "$BUILD/runtime-link-probe-linked-libraries.txt"; then
                  probe_symbol_present=true
                else
                  phase "Runtime framework export or executable dependency validation failed"
                  link_probe_status=127
                fi
              fi
          '''
          if old_validation not in probe_text:
              raise SystemExit("Unable to locate obsolete executable-export validation")
          probe_text = probe_text.replace(old_validation, new_validation, 1)
          probe.write_text(probe_text, encoding="utf-8")

          if probe_text.count("runtime-framework-symbols.txt") != 2:
              raise SystemExit("Graph probe did not receive framework-export validation")
          if probe_text.count("runtime-link-probe-linked-libraries.txt") != 2:
              raise SystemExit("Graph probe did not receive executable dependency validation")

          print("PASS: graph completes runtime linkage and validates the framework export consumed by the executable")
          PY

      - name: Publish pending graph status
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"Building the real upstream RPCS3 target for iOS\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Select iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail
          sdk="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
          if [[ "$sdk" != 26.* ]]; then
            while IFS= read -r app; do
              developer="$app/Contents/Developer"
              candidate="$(DEVELOPER_DIR="$developer" xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
              if [[ "$candidate" == 26.* ]]; then
                sudo xcode-select -s "$developer"
                break
              fi
            done < <(find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort)
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Restore FFmpeg iOS cache
        id: ffmpeg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            BuildSupport/ffmpeg-ios
            .cache/ffmpeg-n7.1
          key: ffmpeg-n7.1-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v1

      - name: Build real upstream RPCS3 graph
        id: graph
        shell: bash
        run: |
          set +e
          bash scripts/probe-upstream-ios-graph.sh
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save FFmpeg iOS cache
        if: always() && steps.ffmpeg-cache.outputs.cache-hit != 'true' && hashFiles('BuildSupport/ffmpeg-ios/.rpcs3-ios-ffmpeg-n7.1') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            BuildSupport/ffmpeg-ios
            .cache/ffmpeg-n7.1
          key: ffmpeg-n7.1-${{ runner.os }}-${{ runner.arch }}-iphoneos26-arm64-v1

      - name: Upload graph evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-real-upstream-ios-graph
          path: cmake-ios-upstream-graph/**
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final graph status
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          probe_status="${{ steps.graph.outputs.status }}"
          if [[ "$probe_status" == "0" ]]; then
            state="success"
            description="Real upstream rpcs3_emu target compiled for iOS"
          else
            state="failure"
            description="Upstream rpcs3_emu reached a documented iOS blocker"
          fi
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
