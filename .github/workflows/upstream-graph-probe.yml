name: Probe Real RPCS3 iOS Graph

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

concurrency:
  group: rpcs3-ios-upstream-graph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    name: Real upstream CMake graph
    runs-on: macos-26
    timeout-minutes: 120
    env:
      STATUS_CONTEXT: "RPCS3 real upstream graph"
    steps:
      - name: Checkout iOS port
        uses: actions/checkout@v4

      - name: Publish pending graph status
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"pending\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"Entering the real upstream RPCS3 CMake graph\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

      - name: Select iOS 26 SDK
        shell: bash
        run: |
          set -euo pipefail
          sdk="$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
          if [[ "$sdk" != 26.* ]]; then
            while IFS= read -r app; do
              developer="$app/Contents/Developer"
              candidate="$(DEVELOPER_DIR="$developer" xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)"
              if [[ "$candidate" == 26.* ]]; then
                sudo xcode-select -s "$developer"
                break
              fi
            done < <(find -L /Applications -maxdepth 1 -name 'Xcode*.app' -print | sort)
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Configure real upstream RPCS3 graph
        id: graph
        shell: bash
        run: |
          set +e
          bash scripts/probe-upstream-ios-graph.sh
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload graph evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RPCS3-real-upstream-ios-graph
          path: cmake-ios-upstream-graph/**
          if-no-files-found: warn
          retention-days: 30

      - name: Publish final graph status
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          probe_status="${{ steps.graph.outputs.status }}"
          if [[ "$probe_status" == "0" ]]; then
            state="success"
            description="Real upstream RPCS3 graph configured for iOS"
          else
            state="failure"
            description="Upstream graph reached a documented iOS blocker"
          fi
          curl --fail --silent --show-error --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$state\",\"context\":\"$STATUS_CONTEXT\",\"description\":\"$description\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
