name: RPCS3-iOS
options:
  bundleIdPrefix: com.nightvibes33
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    CLANG_CXX_LANGUAGE_STANDARD: c++20
    CLANG_ENABLE_OBJC_ARC: YES

fileGroups:
  - BuildSupport/librpcs3-ios-core.a

targets:
  RPCS3-iOS:
    type: application
    platform: iOS
    sources:
      - path: App
    info:
      path: App/Info.plist
    entitlements:
      path: App/RPCS3-iOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nightvibes33.rpcs3ios
        PRODUCT_NAME: RPCS3-iOS
        EXECUTABLE_NAME: RPCS3-iOS
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/CoreBridge"
          - "$(SRCROOT)/Port"
        OTHER_LDFLAGS: "$(inherited) $(SRCROOT)/BuildSupport/librpcs3-ios-core.a -framework Metal -framework AVFoundation -framework AudioToolbox -framework Foundation -framework UIKit -framework UniformTypeIdentifiers"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    scheme:
      testTargets: []
