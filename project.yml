name: RPCS3-iOS
options:
  bundleIdPrefix: com.nightvibes33
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    CODE_SIGN_STYLE: Automatic
    CLANG_CXX_LANGUAGE_STANDARD: c++20
    CLANG_ENABLE_OBJC_ARC: YES
targets:
  RPCS3-iOS:
    type: application
    platform: iOS
    sources:
      - path: App
    info:
      path: App/Info.plist
    entitlements:
      path: App/RPCS3-iOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nightvibes33.rpcs3ios
        PRODUCT_NAME: RPCS3-iOS
        EXECUTABLE_NAME: RPCS3-iOS
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    scheme:
      testTargets: []
